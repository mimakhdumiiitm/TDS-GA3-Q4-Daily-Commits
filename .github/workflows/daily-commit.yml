name: Daily Commit

on:
  schedule:
    - cron: "0 0 * * *"   # runs once per day at 00:00 UTC
  workflow_dispatch:       # allows you to run it manually for testing

jobs:
  daily-commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update daily file - 22f3001418@ds.study.iitm.ac.in
        run: |
          echo "Last run: $(date -u)" >> daily-log.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add daily-log.txt
          git commit -m "chore: daily automated commit" || echo "No changes to commit"
          git push
